name: CI

env:
  POETRY_VERSION: "2.3.3"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, dev]

jobs:
  lint:
    name: Lint (Python 3.12)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Poetry
        run: python -m pip install poetry==${POETRY_VERSION}

      - name: Install project dependencies
        run: >
          python -m poetry install
          --extras "validator-jsonscreamer validator-fastjsonschema"

      - name: black – format check
        run: >
          python -m poetry run black --check
          src demo/mock/demo.py demo/mock/tests demo/l3/demo.py demo/l3/tests

      - name: flake8 – style check
        run: >
          python -m poetry run flake8
          src demo/mock/demo.py demo/mock/tests demo/l3/demo.py demo/l3/tests

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install Poetry
        run: python -m pip install poetry==${POETRY_VERSION}

      - name: Install project dependencies
        run: >
          python -m poetry install
          --extras "validator-jsonscreamer validator-fastjsonschema"

      - name: Run pytest with coverage
        run: >
          python -m poetry run pytest src/
          -m "not slow"
          --cov=src
          --cov-report=xml
          --cov-report=term-missing

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false

  demo-mock:
    name: Demo Mock (Python 3.12)
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Poetry
        run: python -m pip install poetry==${POETRY_VERSION}

      - name: Install project dependencies
        run: >
          python -m poetry install
          --extras "validator-jsonscreamer validator-fastjsonschema"

      - name: Check demo workflow
        run: python -m poetry run python demo/mock/demo.py check

      - name: Ensure generated artefacts are ignored
        run: |
          test -f demo/mock/generated/ping_protocol_parser.py
          git check-ignore demo/mock/generated/ping_protocol_parser.py
          git check-ignore demo/mock/generated/ping_protocol_mock_client.py
          git check-ignore demo/mock/generated/ping_protocol_mock_server.py

  demo-l3:
    name: Demo L3 (Python 3.12)
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Poetry
        run: python -m pip install poetry==${POETRY_VERSION}

      - name: Install project dependencies
        run: >
          python -m poetry install
          --extras "validator-jsonscreamer validator-fastjsonschema"

      - name: Check L3 demo workflow
        run: python -m poetry run python demo/l3/demo.py check

      - name: Ensure generated artefacts are ignored
        run: |
          test -f demo/l3/generated/ping_protocol_parser.py
          test -f demo/l3/generated/ping_protocol_l3_client.py
          test -f demo/l3/generated/ping_protocol_l3_server.py
          test -f demo/l3/generated/ping_protocol.lua
          git check-ignore demo/l3/generated/ping_protocol_parser.py
          git check-ignore demo/l3/generated/ping_protocol_l3_client.py
          git check-ignore demo/l3/generated/ping_protocol_l3_server.py
          git check-ignore demo/l3/generated/ping_protocol.lua
