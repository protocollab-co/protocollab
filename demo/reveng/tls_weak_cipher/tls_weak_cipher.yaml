meta:
  id: tls_weak_cipher
  endian: be
  title: "TLS Weak Cipher Detector"
  description: "Detects known-weak TLS cipher suites in a simplified ClientHello frame"

seq:
  - id: handshake_type
    type: u1
    doc: "Handshake message type: 0x01 = ClientHello"
  - id: tls_version
    type: u2
    doc: "TLS version: 0x0303 = TLS 1.2"
  - id: cipher_suite
    type: u2
    doc: "Offered cipher suite (first / only suite in this simplified frame)"

instances:
  is_client_hello:
    value: handshake_type == 0x01
    wireshark:
      type: bool
      filter-only: true
      label: Is ClientHello

  has_weak_cipher:
    value: cipher_suite in [0x0005, 0x0012, 0x0013, 0x002C, 0x00FF]
    # 0x0005 = TLS_RSA_WITH_RC4_128_SHA      (RC4, broken)
    # 0x0012 = TLS_DHE_DSS_WITH_RC4_128_SHA  (RC4, broken)
    # 0x0013 = TLS_DHE_RSA_WITH_RC4_128_SHA  (RC4, broken)
    # 0x002C = TLS_PSK_WITH_RC4_128_SHA      (RC4, broken)
    # 0x00FF = TLS_FALLBACK_SCSV             (demo only: signals downgrade attack intent)
    wireshark:
      type: bool
      filter-only: true
      label: Weak Cipher
