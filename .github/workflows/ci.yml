name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, dev]

jobs:
  lint:
    name: Lint (Python 3.12)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: black – format check
        run: black --check src demo/mock/demo.py demo/mock/tests

      - name: flake8 – style check
        run: flake8 src demo/mock/demo.py demo/mock/tests

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run pytest with coverage
        run: >
          pytest src/
          -m "not slow"
          --cov=src
          --cov-report=xml
          --cov-report=term-missing

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false

  demo-mock:
    name: Demo Mock (Python 3.12)
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies and package
        run: |
          pip install -r requirements-dev.txt
          pip install -e .

      - name: Check demo workflow
        run: python demo/mock/demo.py check

      - name: Ensure generated artefacts are ignored
        run: |
          test -f demo/mock/generated/ping_protocol_parser.py
          git check-ignore demo/mock/generated/ping_protocol_parser.py
          git check-ignore demo/mock/generated/ping_protocol_mock_client.py
          git check-ignore demo/mock/generated/ping_protocol_mock_server.py
