meta:
  id: ip_scoped
  endian: be
  title: "IP Scoped Frame"
  description: "Minimal IPv4-like frame with per-address scope classification"

seq:
  - id: version
    type: u1
    doc: "Protocol version"
  - id: src_ip
    type: u4
    doc: "Source IPv4 address as a 32-bit integer"
  - id: dst_ip
    type: u4
    doc: "Destination IPv4 address as a 32-bit integer"
  - id: payload_size
    type: u2
    doc: "Payload size in bytes"

instances:
  src_lan:
    value: ((src_ip & 0xFF000000) == 0x0A000000) or ((src_ip & 0xFFF00000) == 0xAC100000) or ((src_ip & 0xFFFF0000) == 0xC0A80000)
      label: Source LAN
    wireshark:
      type: bool
      label: Source NAT

instances:
  src_lan: ((src_ip & 0xFF000000) == 0x0A000000) or ((src_ip & 0xFFF00000) == 0xAC100000) or ((src_ip & 0xFFFF0000) == 0xC0A80000)
  src_nat: (src_ip & 0xFFC00000) == 0x64400000
  src_scope: '"nat" if src_nat else ("lan" if src_lan else "inet")'
  dst_lan: ((dst_ip & 0xFF000000) == 0x0A000000) or ((dst_ip & 0xFFF00000) == 0xAC100000) or ((dst_ip & 0xFFFF0000) == 0xC0A80000)
  dst_nat: (dst_ip & 0xFFC00000) == 0x64400000
  dst_scope: '"nat" if dst_nat else ("lan" if dst_lan else "inet")'
  wireshark:
    src_scope: {type: string, label: "Source Scope"}
    dst_scope: {type: string, label: "Destination Scope"}
      type: bool
