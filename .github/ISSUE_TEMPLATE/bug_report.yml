name: Bug report
description: Report a reproducible problem in protocollab or its standalone packages.
title: "fix(scope): short bug summary"
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug.

        Before submitting, please confirm this is not a security issue. For security reports, use the process described in `SECURITY.md` instead of opening a public issue.
  - type: input
    id: area
    attributes:
      label: Affected area
      description: Which part is affected?
      placeholder: protocollab CLI, yaml_serializer, jsonschema_validator, demo/l3
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the observed behavior and the expected behavior.
      placeholder: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide a minimal reproducible sequence.
      placeholder: |
        1. Run ...
        2. Load ...
        3. Observe ...
      render: markdown
    validations:
      required: true
  - type: textarea
    id: example
    attributes:
      label: Minimal example or input
      description: Paste YAML, schema, CLI command, traceback, or other relevant input.
      render: text
    validations:
      required: false
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Python version, OS, package version, and install method.
      placeholder: |
        OS: Windows 11
        Python: 3.12
        Package: yaml-serializer 1.0.1
        Install: pip install yaml-serializer
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Validation
      description: What did you already verify?
      placeholder: |
        - Reproduced on latest main
        - Checked existing issues
        - Ran tests ...
      render: markdown
    validations:
      required: false
