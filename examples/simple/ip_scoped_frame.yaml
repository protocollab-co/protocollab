meta:
  id: ip_scoped_frame
  endian: be
  title: "IP Scoped Frame"
  description: "Minimal IPv4-like frame with separate source and destination scope fields"

seq:
  - id: version
    type: u1
    doc: "Protocol version"
  - id: src_ip
    type: u4
    doc: "Source IPv4 address as a 32-bit integer"
  - id: dst_ip
    type: u4
    doc: "Destination IPv4 address as a 32-bit integer"
  - id: payload_size
    type: u2
    doc: "Payload size in bytes"

instances:
  src_lan:
    value: ((src_ip & 0xFF000000) == 0x0A000000) or ((src_ip & 0xFFF00000) == 0xAC100000) or ((src_ip & 0xFFFF0000) == 0xC0A80000)
    wireshark:
      type: bool
      filter-only: true
      label: Source LAN

  src_nat:
    value: (src_ip & 0xFFC00000) == 0x64400000
    wireshark:
      type: bool
      filter-only: true
      label: Source NAT

  dst_lan:
    value: ((dst_ip & 0xFF000000) == 0x0A000000) or ((dst_ip & 0xFFF00000) == 0xAC100000) or ((dst_ip & 0xFFFF0000) == 0xC0A80000)
    wireshark:
      type: bool
      filter-only: true
      label: Destination LAN

  dst_nat:
    value: (dst_ip & 0xFFC00000) == 0x64400000
    wireshark:
      type: bool
      filter-only: true
      label: Destination NAT

  dst_bcast:
    value: dst_ip == 0xFFFFFFFF
    wireshark:
      type: bool
      filter-only: true
      label: Destination Broadcast

  dst_multicast:
    value: (dst_ip & 0xF0000000) == 0xE0000000
    wireshark:
      type: bool
      filter-only: true
      label: Destination Multicast

  src_scope:
    value: '"nat" if src_nat else ("lan" if src_lan else "inet")'
    wireshark:
      type: string
      label: Source Scope

  dst_scope:
    value: '"bcast" if dst_bcast else ("multicast" if dst_multicast else ("nat" if dst_nat else ("lan" if dst_lan else "inet")))'
    wireshark:
      type: string
      label: Destination Scope